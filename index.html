<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f6f4ef;
      --ink:       #1c1b18;
      --ink-mid:   #4a473e;
      --ink-light: #8c8880;
      --rule:      #d6d2c8;
      --accent:    #b5452a;
      --measure:   680px;
      --font-head: 'DM Serif Display', Georgia, serif;
      --font-body: 'Libre Baskerville', Georgia, serif;
      --font-ui:   'Lato', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.8;
      min-height: 100vh;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      background: var(--bg);
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loading.fade-out { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
    }

    /* ── Error ── */
    #error {
      display: none;
      max-width: var(--measure);
      margin: 6rem auto;
      padding: 0 1.5rem;
      text-align: center;
    }

    #error.show { display: block; }

    #error p {
      font-family: var(--font-ui);
      font-size: 0.9rem;
      color: var(--ink-mid);
      line-height: 1.7;
    }

    #error strong { color: var(--accent); font-family: var(--font-body); }

    /* ── Page chrome ── */
    .page-rule {
      width: 100%;
      border: none;
      border-top: 1px solid var(--rule);
    }

    header.site-header {
      max-width: var(--measure);
      margin: 0 auto;
      padding: 2.5rem 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-wordmark {
      font-family: var(--font-head);
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      color: var(--ink);
      font-style: italic;
    }

    .site-section {
      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-light);
    }

    /* ── Article ── */
    #article {
      display: none;
      max-width: var(--measure);
      margin: 0 auto;
      padding: 3rem 1.5rem 7rem;
      animation: fade-up 0.6s ease both;
    }

    #article.show { display: block; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Doc content typography ── */
    #doc-body { color: var(--ink); }

    #doc-body h1 {
      font-family: var(--font-head);
      font-size: clamp(2.1rem, 5.5vw, 3.2rem);
      font-weight: 400;
      line-height: 1.18;
      letter-spacing: -0.01em;
      margin: 0 0 1.5rem;
      color: var(--ink);
    }

    #doc-body h2 {
      font-family: var(--font-head);
      font-size: clamp(1.5rem, 3.5vw, 2rem);
      font-weight: 400;
      line-height: 1.3;
      margin: 3rem 0 0.75rem;
      color: var(--ink);
    }

    #doc-body h3 {
      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 2.5rem 0 0.5rem;
    }

    #doc-body h4 {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      margin: 1.75rem 0 0.25rem;
    }

    #doc-body h5, #doc-body h6 {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 700;
      margin: 1.5rem 0 0.25rem;
      color: var(--ink-mid);
    }

    /* Separator rule between header block and body */
    #doc-body h1 + p,
    #doc-body h1 + h2 {
      margin-top: 0;
    }

    #doc-body p {
      margin: 0 0 1.4rem;
      color: var(--ink);
    }

    /* Drop cap on first paragraph following an h1 */
    #doc-body h1 ~ p:first-of-type::first-letter,
    #doc-body > p:first-of-type::first-letter {
      font-family: var(--font-head);
      font-size: 4.2em;
      font-weight: 400;
      float: left;
      line-height: 0.78;
      margin: 0.1em 0.1em -0.05em 0;
      color: var(--accent);
    }

    #doc-body strong, #doc-body b {
      font-weight: 700;
    }

    #doc-body em, #doc-body i {
      font-style: italic;
    }

    #doc-body u {
      text-decoration: underline;
      text-decoration-color: var(--rule);
      text-underline-offset: 4px;
    }

    #doc-body a {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-color: var(--accent);
      text-underline-offset: 3px;
      transition: color 0.2s;
    }

    #doc-body a:hover { color: var(--accent); }

    #doc-body ul, #doc-body ol {
      padding-left: 1.4rem;
      margin: 0 0 1.4rem;
    }

    #doc-body li { margin-bottom: 0.4rem; }

    #doc-body li::marker { color: var(--accent); }

    #doc-body blockquote {
      margin: 2rem 0;
      padding: 0.25rem 0 0.25rem 1.5rem;
      border-left: 3px solid var(--accent);
      font-style: italic;
      font-size: 1.1em;
      color: var(--ink-mid);
    }

    #doc-body hr {
      border: none;
      margin: 3rem auto;
      width: 6rem;
      border-top: 1px solid var(--rule);
    }

    #doc-body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 2rem auto;
    }

    #doc-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.88rem;
    }

    #doc-body th {
      font-family: var(--font-ui);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      border-bottom: 1px solid var(--ink);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    #doc-body td {
      border-bottom: 1px solid var(--rule);
      padding: 0.6rem 0.75rem;
    }

    /* Google Docs wraps everything in extra divs with inline styles — neutralise */
    #doc-body * {
      font-family: inherit;
    }

    /* ── Footer ── */
    footer.site-footer {
      max-width: var(--measure);
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1.5rem;
    }

    .footer-copy {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--ink-light);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      body { font-size: 16px; }
      #article { padding: 2rem 1.25rem 5rem; }
      #doc-body h1 { font-size: clamp(1.8rem, 8vw, 2.4rem); }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="spinner"></div>
    <span class="loading-label">Loading article</span>
  </div>

  <!-- Error screen -->
  <div id="error">
    <p>
      <strong>Could not load document.</strong><br/>
      Please ensure the Google Doc is shared as
      <em>"Anyone with the link can view"</em> and that the URL in the
      source code is correct.
    </p>
  </div>

  <!-- Page chrome (always visible once loaded) -->
  <hr class="page-rule" id="top-rule" style="display:none" />
  <header class="site-header" id="site-header" style="display:none">
    <span class="site-wordmark">Reading</span>
    <span class="site-section">Essay</span>
  </header>
  <hr class="page-rule" id="mid-rule" style="display:none" />

  <!-- Article -->
  <article id="article">
    <div id="doc-body"></div>
  </article>

  <!-- Footer -->
  <footer class="site-footer" id="site-footer" style="display:none">
    <hr class="page-rule" />
    <div class="footer-inner">
      <span class="footer-copy" id="footer-year"></span>
    </div>
  </footer>

  <script>
    // =====================================================================
    //  PASTE YOUR GOOGLE DOC URL BELOW
    //  Any sharing format works: /edit, /view, or /pub links all accepted.
    //  The document must be set to "Anyone with the link can view".
    // =====================================================================
    const GOOGLE_DOC_URL = 'https://docs.google.com/document/d/YOUR_DOC_ID_HERE/edit';
    // =====================================================================


    /* ── Helpers ── */

    function extractDocId(url) {
      const m = url.match(/\/document\/d\/([a-zA-Z0-9_-]+)/);
      return m ? m[1] : null;
    }

    function promoteSpanStyles(root) {
      // Convert Google Docs' span-based bold/italic into semantic elements
      root.querySelectorAll('span').forEach(span => {
        const s = span.getAttribute('style') || '';
        const bold   = /font-weight\s*:\s*(bold|[6-9]\d{2})/i.test(s);
        const italic = /font-style\s*:\s*italic/i.test(s);

        if (!bold && !italic) return;

        let replacement;
        if (bold && italic) {
          const em = document.createElement('em');
          em.innerHTML = span.innerHTML;
          replacement = document.createElement('strong');
          replacement.appendChild(em);
        } else if (bold) {
          replacement = document.createElement('strong');
          replacement.innerHTML = span.innerHTML;
        } else {
          replacement = document.createElement('em');
          replacement.innerHTML = span.innerHTML;
        }
        span.replaceWith(replacement);
      });
    }

    function stripGoogleNoise(root) {
      // Remove elements Google adds that aren't content
      root.querySelectorAll(
        'script, style, #header, #footer, #banners, .doc-content-margin-bottom'
      ).forEach(el => el.remove());

      // Strip all inline styles so our CSS takes over
      root.querySelectorAll('[style]').forEach(el => el.removeAttribute('style'));

      // Strip Google class names (c0, c1, lst-kix-…, etc.)
      root.querySelectorAll('[class]').forEach(el => el.removeAttribute('class'));

      // Strip id attributes (Google uses them for internal anchors)
      root.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
    }

    function cleanGoogleHtml(raw) {
      const parser  = new DOMParser();
      const gdoc    = parser.parseFromString(raw, 'text/html');

      // Prefer the #contents wrapper if present; fall back to body
      const root = gdoc.querySelector('#contents') || gdoc.body;
      if (!root) return '';

      promoteSpanStyles(root);
      stripGoogleNoise(root);

      return root.innerHTML;
    }

    /* ── Main ── */

    async function loadDocument() {
      const docId = extractDocId(GOOGLE_DOC_URL);
      if (!docId) {
        showError();
        return;
      }

      // Use the HTML export endpoint (requires "Anyone can view" sharing)
      const exportUrl  = `https://docs.google.com/document/d/${1fa2LWPzlc7FPEYyGEhSqt7iz77MTq-gKktny7S4DkhI}/export?format=html`;
      // Route through a CORS proxy so the browser can fetch cross-origin
      const proxyUrl   = `https://api.allorigins.win/get?url=${encodeURIComponent(exportUrl)}`;

      try {
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data    = await res.json();
        const cleaned = cleanGoogleHtml(data.contents || '');

        if (!cleaned.trim()) throw new Error('Empty document');

        // Inject content
        document.getElementById('doc-body').innerHTML = cleaned;

        // Derive page title from the first heading found
        const firstHeading = document.querySelector('#doc-body h1, #doc-body h2');
        if (firstHeading) {
          document.title = firstHeading.textContent.trim();
        }

        // Set footer year
        document.getElementById('footer-year').textContent =
          `© ${new Date().getFullYear()}`;

        // Reveal everything
        showChrome();
      } catch (err) {
        console.error('[Article loader]', err);
        showError();
      }
    }

    function showChrome() {
      const loading = document.getElementById('loading');
      loading.classList.add('fade-out');
      setTimeout(() => { loading.style.display = 'none'; }, 550);

      ['top-rule', 'site-header', 'mid-rule', 'site-footer'].forEach(id => {
        document.getElementById(id).style.display = '';
      });

      document.getElementById('article').classList.add('show');
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').classList.add('show');
    }

    loadDocument();
  </script>
</body>
</html>
